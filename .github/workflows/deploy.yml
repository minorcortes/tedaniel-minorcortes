name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy via FTP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to FTP server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          port: ${{ secrets.FTP_PORT }}
          server-dir: /
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            .gitignore
            deploy.sh
            .ftp-credentials
            docs/**
            backend/**
            .tmp/**
            node_modules/**
            images/**
            bear-animation.html
            capture_*.js
            convert_*.sh
            css/styles.css
            css/styles.original.css
            js/main.js
            js/main.original.js
            js/rsvp.js
            js/rsvp.original.js
            .DS_Store
            **/.DS_Store
            *.gitkeep
            .github/**
          log-level: standard
