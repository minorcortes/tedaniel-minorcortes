<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PRIVACIDAD: Bloqueo total de indexación, rastreo, imágenes y snippets -->
  <meta name="robots" content="noindex, nofollow, noarchive, noimageindex, nosnippet">
  <meta name="googlebot" content="noindex, nofollow, noarchive, noimageindex, nosnippet">

  <title>Té Daniel</title>

  <!-- Google Fonts: Cormorant Infant (títulos), Great Vibes (acento), Quicksand (cuerpo) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Infant:wght@400;600;700&family=Great+Vibes&family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Sticky Navigation -->
  <header id="header" class="site-header">
    <nav class="site-nav" aria-label="Navegación principal">
      <a href="#hero" class="nav-brand font-display">Té Daniel</a>

      <!-- Botón hamburguesa para menú móvil -->
      <button id="mobile-menu-btn" class="mobile-menu-btn" aria-label="Abrir menú" aria-expanded="false" aria-controls="nav-links">
        <span class="hamburger-icon" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </span>
      </button>

      <ul id="nav-links" class="nav-links">
        <li><a href="#nosotros">Nosotros</a></li>
        <li><a href="#evento">Evento</a></li>
        <li><a href="#confirmar" class="nav-btn-cta">Confirmar</a></li>
        <li><a href="#regalos">Regalos</a></li>
      </ul>
    </nav>
  </header>

  <!-- Main Content -->
  <main>
    <section id="hero" class="section-hero" aria-label="Bienvenida">

      <!-- Capa 0: Fondo acuarela (futura imagen full-bleed) -->
      <div class="hero-bg" aria-hidden="true"></div>

      <!-- Capa 1: Zonas decorativas para assets de acuarela -->
      <div class="hero-decor" aria-hidden="true">
        <div class="hero-asset hero-asset--left">
          <!-- Futuro: caballo balancín acuarela (512×512 @2x) -->
        </div>
        <div class="hero-asset hero-asset--right">
          <!-- Futuro: oso de peluche acuarela (512×512 @2x) -->
        </div>
        <div class="hero-asset hero-asset--top-left">
          <!-- Futuro: estrellas + nubes acuarela (512×512 @2x) -->
        </div>
        <div class="hero-asset hero-asset--top-right">
          <!-- Futuro: móvil de cuna acuarela (512×512 @2x) -->
        </div>
      </div>

      <!-- Capa 2: Contenido principal -->
      <div class="hero-content">
        <p class="hero-eyebrow font-display">Estás invitado(a) a</p>
        <h1 class="hero-title font-script">Té Daniel</h1>
        <div class="hero-divider" aria-hidden="true"></div>
        <p class="hero-subtitle font-display">Baby Shower</p>
      </div>

      <!-- Indicador de scroll -->
      <div class="hero-scroll-cue" aria-hidden="true">
        <span class="scroll-arrow">⌄</span>
      </div>

    </section>

    <section id="nosotros" class="section-surface">
      <div class="container">
        <h2 class="font-display">Nosotros</h2>
      </div>
    </section>

    <section id="daniel" class="section-default">
      <div class="container">
        <h2 class="font-display">Sobre Daniel</h2>
      </div>
    </section>

    <section id="evento" class="section-accent">
      <div class="container">
        <h2 class="font-display">El Evento</h2>
      </div>
    </section>

    <section id="confirmar" class="section-surface">
      <div class="container">
        <h2 class="font-display">Confirmar Asistencia</h2>
      </div>
    </section>

    <section id="regalos" class="section-default">
      <div class="container">
        <h2 class="font-display">Regalos y Contribuciones</h2>
      </div>
    </section>

    <section id="cierre" class="section-footer">
      <div class="container">
        <h2 class="font-script">Con amor,</h2>
        <!-- Texto neutral, fácil de reemplazar luego -->
        <p class="font-display">Cindy y Minor</p>
      </div>
    </section>
  </main>

  <!-- Back to Top Button -->
  <button id="back-to-top" class="back-to-top" aria-label="Volver arriba">↑</button>

  <script src="js/main.js"></script>
</body>
</html>
