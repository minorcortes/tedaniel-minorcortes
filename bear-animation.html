<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watercolor Bear Animation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: transparent;
      display: flex; align-items: center; justify-content: center;
    }
    .bear-stage {
      width: 360px;
      height: 420px;
      position: relative;
    }
    svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    /* ── Breathing: whole bear bobs gently ── */
    @keyframes breathe {
      0%   { transform: translateY(0px) scaleY(1); }
      45%  { transform: translateY(-4px) scaleY(1.012); }
      100% { transform: translateY(0px) scaleY(1); }
    }

    /* ── Head tilt ── */
    @keyframes headTilt {
      0%   { transform: rotate(0deg); }
      30%  { transform: rotate(2.5deg); }
      65%  { transform: rotate(-1.5deg); }
      100% { transform: rotate(0deg); }
    }

    /* ── Right arm wave (fires mid-loop) ── */
    @keyframes waveArm {
      0%,  34%  { transform: rotate(0deg); }
      38%        { transform: rotate(-38deg); }
      43%        { transform: rotate(-18deg); }
      48%        { transform: rotate(-40deg); }
      53%        { transform: rotate(-20deg); }
      58%        { transform: rotate(-38deg); }
      64%        { transform: rotate(0deg); }
      100%       { transform: rotate(0deg); }
    }

    /* ── Left arm gentle rest sway ── */
    @keyframes restArm {
      0%   { transform: rotate(0deg); }
      50%  { transform: rotate(-2.5deg); }
      100% { transform: rotate(0deg); }
    }

    /* ── Balloon 1 float ── */
    @keyframes balloon1 {
      0%   { transform: translate(0, 0) rotate(-3deg); }
      35%  { transform: translate(4px, -7px) rotate(3deg); }
      70%  { transform: translate(-3px, -3px) rotate(-5deg); }
      100% { transform: translate(0, 0) rotate(-3deg); }
    }
    /* ── Balloon 2 float ── */
    @keyframes balloon2 {
      0%   { transform: translate(0, 0) rotate(2deg); }
      40%  { transform: translate(-5px, -9px) rotate(-3deg); }
      75%  { transform: translate(4px, -4px) rotate(4deg); }
      100% { transform: translate(0, 0) rotate(2deg); }
    }
    /* ── Balloon 3 float ── */
    @keyframes balloon3 {
      0%   { transform: translate(0, 0) rotate(-1deg); }
      45%  { transform: translate(3px, -6px) rotate(4deg); }
      80%  { transform: translate(-4px, -2px) rotate(-3deg); }
      100% { transform: translate(0, 0) rotate(-1deg); }
    }

    /* ── Cloud drift ── */
    @keyframes cloudDrift {
      0%   { transform: translateX(0); }
      50%  { transform: translateX(3px); }
      100% { transform: translateX(0); }
    }

    /* Apply animations */
    .anim-breathe {
      transform-origin: center 280px;
      animation: breathe 4.8s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
    }
    .anim-head {
      transform-origin: 180px 138px;
      animation: headTilt 6s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
    }
    .anim-wave-arm {
      transform-origin: 218px 220px;
      animation: waveArm 8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    .anim-rest-arm {
      transform-origin: 140px 224px;
      animation: restArm 4.8s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
    }
    .anim-balloon1 {
      transform-origin: 128px 130px;
      animation: balloon1 5.4s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
    }
    .anim-balloon2 {
      transform-origin: 180px 100px;
      animation: balloon2 6.2s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
      animation-delay: -1.3s;
    }
    .anim-balloon3 {
      transform-origin: 230px 118px;
      animation: balloon3 5.8s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
      animation-delay: -2.7s;
    }
    .anim-cloud {
      animation: cloudDrift 7s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
    }
  </style>
</head>
<body>
<div class="bear-stage">
<svg viewBox="0 0 360 420" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Watercolor paper texture via fractal noise -->
    <filter id="wc-body" x="-15%" y="-15%" width="130%" height="130%">
      <feTurbulence type="fractalNoise" baseFrequency="0.048 0.052" numOctaves="6" seed="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4.5" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
      <feGaussianBlur in="displaced" stdDeviation="0.9" result="blurred"/>
      <feBlend in="SourceGraphic" in2="blurred" mode="multiply" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>

    <filter id="wc-head" x="-18%" y="-18%" width="136%" height="136%">
      <feTurbulence type="fractalNoise" baseFrequency="0.044 0.050" numOctaves="5" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
      <feGaussianBlur in="displaced" stdDeviation="1.1" result="blurred"/>
      <feComposite in="blurred" in2="SourceGraphic" operator="in"/>
    </filter>

    <filter id="wc-balloon" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.06 0.07" numOctaves="4" seed="12" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.5" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
      <feGaussianBlur in="displaced" stdDeviation="1.2" result="blurred"/>
      <feComposite in="blurred" in2="SourceGraphic" operator="in"/>
    </filter>

    <filter id="wc-cloud" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency="0.035 0.040" numOctaves="5" seed="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="6" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
      <feGaussianBlur in="displaced" stdDeviation="2.2" result="blurred"/>
      <feComposite in="blurred" in2="SourceGraphic" operator="in"/>
    </filter>

    <filter id="soft-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Bear body — warm camel gradient -->
    <radialGradient id="grad-body" cx="46%" cy="40%" r="55%">
      <stop offset="0%"   stop-color="#EDD9BE"/>
      <stop offset="55%"  stop-color="#D8B38A"/>
      <stop offset="100%" stop-color="#C09A72" stop-opacity="0.9"/>
    </radialGradient>

    <!-- Bear belly — lighter patch -->
    <radialGradient id="grad-belly" cx="50%" cy="45%" r="50%">
      <stop offset="0%"   stop-color="#F5E8D4"/>
      <stop offset="100%" stop-color="#E9D4BC" stop-opacity="0.6"/>
    </radialGradient>

    <!-- Bear face inner ear / muzzle -->
    <radialGradient id="grad-inner" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#F2DECA"/>
      <stop offset="100%" stop-color="#DDBE9E" stop-opacity="0.7"/>
    </radialGradient>

    <!-- Cloud gradient -->
    <radialGradient id="grad-cloud" cx="50%" cy="40%" r="55%">
      <stop offset="0%"   stop-color="#FEFEFE"/>
      <stop offset="70%"  stop-color="#F0EEF0"/>
      <stop offset="100%" stop-color="#E2DDE6" stop-opacity="0.7"/>
    </radialGradient>

    <!-- Balloon gradients -->
    <radialGradient id="grad-bal1" cx="38%" cy="32%" r="55%">
      <stop offset="0%"   stop-color="#E8C5D0"/>
      <stop offset="100%" stop-color="#C89AAE" stop-opacity="0.85"/>
    </radialGradient>
    <radialGradient id="grad-bal2" cx="38%" cy="32%" r="55%">
      <stop offset="0%"   stop-color="#C9D8DE"/>
      <stop offset="100%" stop-color="#9BBBC8" stop-opacity="0.85"/>
    </radialGradient>
    <radialGradient id="grad-bal3" cx="38%" cy="32%" r="55%">
      <stop offset="0%"   stop-color="#F4E3A6"/>
      <stop offset="100%" stop-color="#DBC87A" stop-opacity="0.85"/>
    </radialGradient>

    <!-- Warm diffused light overlay on whole scene -->
    <radialGradient id="grad-light" cx="50%" cy="30%" r="60%">
      <stop offset="0%"   stop-color="#FFF8EE" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFF8EE" stop-opacity="0"/>
    </radialGradient>

  </defs>

  <!-- ══ CLOUD ══ -->
  <g class="anim-cloud">
    <g filter="url(#wc-cloud)">
      <!-- Cloud base puffs -->
      <ellipse cx="180" cy="378" rx="130" ry="36" fill="url(#grad-cloud)" opacity="0.95"/>
      <ellipse cx="108" cy="368" rx="58" ry="34" fill="url(#grad-cloud)" opacity="0.92"/>
      <ellipse cx="155" cy="356" rx="52" ry="32" fill="url(#grad-cloud)" opacity="0.90"/>
      <ellipse cx="205" cy="352" rx="58" ry="35" fill="url(#grad-cloud)" opacity="0.92"/>
      <ellipse cx="256" cy="362" rx="56" ry="32" fill="url(#grad-cloud)" opacity="0.90"/>
      <ellipse cx="290" cy="374" rx="46" ry="28" fill="url(#grad-cloud)" opacity="0.88"/>
      <!-- Subtle cloud shadow -->
      <ellipse cx="180" cy="395" rx="118" ry="12" fill="#C8BECE" opacity="0.18"/>
    </g>
  </g>

  <!-- ══ WHOLE BEAR (breathe wrapper) ══ -->
  <g class="anim-breathe">

    <!-- ── LEFT ARM (resting, holding balloon strings) ── -->
    <g class="anim-rest-arm" filter="url(#wc-body)">
      <ellipse cx="132" cy="248" rx="20" ry="36" fill="url(#grad-body)" transform="rotate(-22 132 224)"/>
      <!-- paw -->
      <ellipse cx="122" cy="278" rx="16" ry="12" fill="url(#grad-body)"/>
    </g>

    <!-- ── BODY ── -->
    <g filter="url(#wc-body)">
      <!-- Main torso -->
      <ellipse cx="180" cy="285" rx="72" ry="78" fill="url(#grad-body)"/>
      <!-- Belly patch -->
      <ellipse cx="180" cy="292" rx="44" ry="52" fill="url(#grad-belly)" opacity="0.75"/>
    </g>

    <!-- ── RIGHT ARM (waving) ── -->
    <g class="anim-wave-arm" filter="url(#wc-body)">
      <ellipse cx="228" cy="248" rx="20" ry="36" fill="url(#grad-body)" transform="rotate(22 228 220)"/>
      <!-- paw -->
      <ellipse cx="240" cy="276" rx="16" ry="12" fill="url(#grad-body)"/>
    </g>

    <!-- ── LEGS / FEET ── -->
    <g filter="url(#wc-body)">
      <ellipse cx="152" cy="348" rx="24" ry="14" fill="url(#grad-body)" opacity="0.9"/>
      <ellipse cx="210" cy="348" rx="24" ry="14" fill="url(#grad-body)" opacity="0.9"/>
      <!-- foot pads -->
      <ellipse cx="152" cy="354" rx="18" ry="9"  fill="url(#grad-inner)" opacity="0.6"/>
      <ellipse cx="210" cy="354" rx="18" ry="9"  fill="url(#grad-inner)" opacity="0.6"/>
    </g>

    <!-- ── HEAD ── -->
    <g class="anim-head">
      <!-- Ears -->
      <g filter="url(#wc-head)">
        <circle cx="133" cy="100" r="26" fill="url(#grad-body)"/>
        <circle cx="227" cy="100" r="26" fill="url(#grad-body)"/>
        <!-- Inner ears -->
        <circle cx="133" cy="102" r="16" fill="url(#grad-inner)" opacity="0.7"/>
        <circle cx="227" cy="102" r="16" fill="url(#grad-inner)" opacity="0.7"/>
      </g>
      <!-- Head main -->
      <g filter="url(#wc-head)">
        <circle cx="180" cy="145" r="68" fill="url(#grad-body)"/>
      </g>
      <!-- Muzzle -->
      <g filter="url(#wc-head)">
        <ellipse cx="180" cy="165" rx="30" ry="22" fill="url(#grad-inner)" opacity="0.75"/>
      </g>
      <!-- Eyes — soft watercolor dots -->
      <circle cx="158" cy="138" r="7"   fill="#7B593F" opacity="0.85"/>
      <circle cx="202" cy="138" r="7"   fill="#7B593F" opacity="0.85"/>
      <circle cx="155" cy="135" r="2.5" fill="#F5EAD8" opacity="0.7"/>
      <circle cx="199" cy="135" r="2.5" fill="#F5EAD8" opacity="0.7"/>
      <!-- Nose -->
      <ellipse cx="180" cy="158" rx="7" ry="5" fill="#C09A72" opacity="0.9"/>
      <!-- Smile — simple soft arc -->
      <path d="M168 168 Q180 178 192 168" stroke="#C09A72" stroke-width="2.2" fill="none"
            stroke-linecap="round" opacity="0.8"/>
      <!-- Rosy cheeks -->
      <ellipse cx="148" cy="158" rx="12" ry="8" fill="#E8C5D0" opacity="0.35"/>
      <ellipse cx="212" cy="158" rx="12" ry="8" fill="#E8C5D0" opacity="0.35"/>
    </g>

  </g><!-- end breathe group -->

  <!-- ══ BALLOONS (outside breathe so they float independently) ══ -->

  <!-- Balloon strings from left paw to balloons -->
  <g opacity="0.55" stroke="#C8BEB4" stroke-width="1.2" fill="none" stroke-linecap="round">
    <path d="M126 276 C118 240, 112 200, 120 158"/>
    <path d="M126 276 C124 236, 168 180, 172 122"/>
    <path d="M126 276 C132 240, 210 194, 222 148"/>
  </g>

  <!-- Balloon 1 — blush pink -->
  <g class="anim-balloon1" filter="url(#wc-balloon)">
    <ellipse cx="120" cy="122" rx="22" ry="27" fill="url(#grad-bal1)" opacity="0.88"/>
    <path d="M120 149 L118 155 L122 155 Z" fill="#C89AAE" opacity="0.6"/>
    <!-- highlight -->
    <ellipse cx="113" cy="112" rx="5" ry="7" fill="white" opacity="0.35"/>
  </g>

  <!-- Balloon 2 — dusty blue -->
  <g class="anim-balloon2" filter="url(#wc-balloon)">
    <ellipse cx="174" cy="94" rx="24" ry="29" fill="url(#grad-bal2)" opacity="0.88"/>
    <path d="M174 123 L172 130 L176 130 Z" fill="#9BBBC8" opacity="0.6"/>
    <ellipse cx="166" cy="83" rx="5.5" ry="8" fill="white" opacity="0.35"/>
  </g>

  <!-- Balloon 3 — butter yellow -->
  <g class="anim-balloon3" filter="url(#wc-balloon)">
    <ellipse cx="226" cy="110" rx="22" ry="27" fill="url(#grad-bal3)" opacity="0.88"/>
    <path d="M226 137 L224 144 L228 144 Z" fill="#DBC87A" opacity="0.6"/>
    <ellipse cx="218" cy="99" rx="5" ry="7" fill="white" opacity="0.35"/>
  </g>

  <!-- ══ WARM LIGHT WASH (top layer, non-interactive) ══ -->
  <ellipse cx="180" cy="160" rx="200" ry="200" fill="url(#grad-light)" opacity="1" pointer-events="none"/>

</svg>
</div>
</body>
</html>
